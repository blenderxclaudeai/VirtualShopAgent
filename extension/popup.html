<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VTO</title>
    <style>
      body { font-family: Arial, sans-serif; width: 320px; margin: 0; padding: 12px; }
      .card { background: #f6f7fb; border-radius: 12px; padding: 12px; }
      .label { font-size: 12px; color: #555; margin: 8px 0 4px; }
      .value { font-size: 13px; word-break: break-all; }
      a { display: inline-block; margin-top: 10px; color: #1f4aff; text-decoration: none; }
    </style>
  </head>
  <body>
    <h2>VTO</h2>
    <div class="card">
      <div class="label">Backend status</div>
      <div class="value" id="status">Configured</div>
      <div class="label">Supabase URL</div>
      <div class="value" id="supabaseUrl"></div>
      <div class="label">Function</div>
      <div class="value" id="functionName"></div>
      <a id="dashboardLink" href="#" target="_blank" rel="noreferrer">Open dashboard</a>
    </div>

    <script src="config.js"></script>
    <script>
      document.getElementById("supabaseUrl").textContent = VSA_CONFIG.supabaseUrl;
      document.getElementById("functionName").textContent = VSA_CONFIG.tryonFunctionName;
      document.getElementById("dashboardLink").href = VSA_CONFIG.webDashboardUrl;
      const configured = !VSA_CONFIG.supabaseUrl.includes("YOUR_PROJECT");
      document.getElementById("status").textContent = configured ? "Configured" : "Update config.js";
    </script>
  </body>
</html>
